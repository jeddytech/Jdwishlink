<!DOCTYPE html>
<html lang="en">
<head>

<body>

  <div class="container">

    <h1>🎉 JDWishLink</h1>
    <p>Create birthday wish pages in seconds</p>

    <div class="card">
      <h2>Create Birthday Event</h2>

      <input id="name" placeholder="Birthday person's name">
      <input id="message" placeholder="Your birthday message">

      <button onclick="createEvent()">Generate Link</button>

      <p id="result"></p>
