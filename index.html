<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>JDWishLink</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<header class="hero">

<h1>🎉 JDWishLink</h1>

<p>Create beautiful celebration pages and collect heartfelt messages from everyone you care about.</p>

</header>

<section class="card">

<h2>Create an Event</h2>

<select id="eventType">
<option value="">Select Event Type</option>
<option>Birthday</option>
<option>Wedding</option>
<option>Anniversary</option>
<option>Graduation</option>
<option>Baby Shower</option>
<option>Church Event</option>
<option>Retirement</option>
<option>Memorial</option>
<option>House Warming</option>
<option>Other</option>
</select>

<input
type="text"
id="recipientName"
placeholder="Recipient's Name">

<input
type="text"
id="eventTitle"
placeholder="Event Title">

<textarea
id="eventMessage"
placeholder="Write a short introduction..."></textarea>

<input
type="date"
id="eventDate">

<button id="createBtn">
✨ Create Celebration Page
</button>

<div id="eventLink"></div>

</section>

<footer>

<p>Made with ❤️ by <strong>JeddyTech</strong></p>

</footer>

<script type="module" src="script.js"></script>

</body>
                                    </html>
